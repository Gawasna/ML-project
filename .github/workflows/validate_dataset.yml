name: Validate dataset

on:
  pull_request:
    branches: [master]
    paths:
      - "data/train/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get changed .jsonl files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/master...HEAD -- 'data/train/*.jsonl')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate changed files
        if: steps.changed.outputs.files != ''
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "==> Validating $f"
            python scripts/validate_dataset.py --file "$f"
          done <<< "${{ steps.changed.outputs.files }}"

      - name: Comment on PR if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Validate thất bại.**\n\nChạy lệnh sau để xem lỗi:\n```bash\npython scripts/validate_dataset.py --file data/train/<file>.jsonl\n```\nSửa rồi push lại.'
            })
